name: Build distribution package

# Fires on annotated release tags like v2026.04.23. The build script already
# takes a version arg (YYYY.MM.DD), so we strip the leading "v" and hand it
# over. Artifacts are uploaded to the workflow run AND attached to a
# generated GitHub Release so the operator can grab the tarball without
# running the build locally.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for softprops/action-gh-release to publish

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build distribution
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/build-distribution.sh
          ./scripts/build-distribution.sh "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tako-crm-${{ github.ref_name }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/manifest.json
          generate_release_notes: true
